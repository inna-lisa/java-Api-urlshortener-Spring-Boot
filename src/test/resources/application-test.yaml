spring:
  application:
    name: url-shortener
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 10
    connect-retry-delay: 5000

server:
  port: 8080

security:
  jwt:
    secret: very-long-and-secure-key-32-plus-chars-and-secure-key-32-plus-chars
    expiration: 3600000

link:
  expiration-days: 30
